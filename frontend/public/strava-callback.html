<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strava Authorization</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 400px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.5rem;
            margin: 0 0 0.5rem;
            font-weight: 600;
        }
        p {
            margin: 0;
            opacity: 0.9;
            font-size: 0.95rem;
        }
        .success {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .error {
            background: rgba(239, 68, 68, 0.2);
        }
        .error-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="spinner"></div>
        <h1>Connecting to Strava...</h1>
        <p>Please wait while we complete the authorization</p>
    </div>

    <script>
        (function() {
            try {
                // Get URL parameters
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const error = urlParams.get('error');
                const errorDescription = urlParams.get('error_description');

                if (error) {
                    // Show error
                    document.getElementById('container').innerHTML = `
                        <div class="error-icon">❌</div>
                        <h1>Authorization Failed</h1>
                        <p>${errorDescription || error}</p>
                    `;
                    document.getElementById('container').classList.add('error');
                    
                    // Send error to parent
                    if (window.opener) {
                        window.opener.postMessage({
                            type: 'STRAVA_AUTH_ERROR',
                            error: error,
                            errorDescription: errorDescription
                        }, window.location.origin);
                    }
                    
                    setTimeout(() => window.close(), 3000);
                    return;
                }

                if (code) {
                    // Show success
                    document.getElementById('container').innerHTML = `
                        <div class="success">✅</div>
                        <h1>Authorization Successful!</h1>
                        <p>Closing window...</p>
                    `;
                    
                    // Send code to parent window
                    if (window.opener) {
                        window.opener.postMessage({
                            type: 'STRAVA_AUTH_SUCCESS',
                            code: code
                        }, window.location.origin);
                        
                        // Close window after a short delay
                        setTimeout(() => window.close(), 1500);
                    } else {
                        document.getElementById('container').innerHTML = `
                            <div class="error-icon">⚠️</div>
                            <h1>Please close this window</h1>
                            <p>Authorization code: <strong>${code}</strong></p>
                        `;
                    }
                } else {
                    // No code or error
                    document.getElementById('container').innerHTML = `
                        <div class="error-icon">⚠️</div>
                        <h1>No Authorization Code</h1>
                        <p>Please try again</p>
                    `;
                    document.getElementById('container').classList.add('error');
                    setTimeout(() => window.close(), 3000);
                }
            } catch (e) {
                console.error('Callback error:', e);
                document.getElementById('container').innerHTML = `
                    <div class="error-icon">❌</div>
                    <h1>Error</h1>
                    <p>${e.message}</p>
                `;
                document.getElementById('container').classList.add('error');
            }
        })();
    </script>
</body>
</html>
